services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luma}
      POSTGRES_DB: luma
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luma -d luma"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [internal]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-dev}
        BUILD_GIT_BRANCH: ${BUILD_GIT_BRANCH:-main}
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://luma:${POSTGRES_PASSWORD:-luma}@db:5432/luma
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-luma}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-production}
      OTEL_PROMETHEUS_PORT: "9464"
      OTEL_PROMETHEUS_HOST: "0.0.0.0"
      # ZOHO-GW-1: gateway lives on LXC 9503 (zoho-integration-service)
      # at 192.168.1.205:8000. The optional shared secret is read by
      # lib/integrations/zoho/gateway.ts and sent as x-luma-zoho-secret;
      # also sent as X-Internal-Token to match the gateway's auth.
      ZOHO_INTEGRATION_URL: ${ZOHO_INTEGRATION_URL:-http://192.168.1.205:8000}
      ZOHO_INTEGRATION_SECRET: ${ZOHO_INTEGRATION_SECRET:-}
      # ZOHO-GW-2: multi-brand gateway. Pick which brand's Zoho creds
      # the gateway should use on this Luma deployment. Sent on every
      # protected call as X-Brand. Required for ZOHO-2 onward.
      ZOHO_BRAND: ${ZOHO_BRAND:-}
      # ZOHO-GW-3: bearer-auth assembly service client (lib/zoho/assembly-service-client.ts).
      # ZOHO_SERVICE_BEARER_SECRET — the rotated per-deployment token.
      # ZOHO_DRY_RUN_WRITES_ENABLED — must be exactly "true" to allow write calls.
      # ZOHO_WAREHOUSE_ID — optional; omit or leave empty to skip warehouse header.
      ZOHO_SERVICE_BEARER_SECRET: ${ZOHO_SERVICE_BEARER_SECRET:-}
      ZOHO_DRY_RUN_WRITES_ENABLED: ${ZOHO_DRY_RUN_WRITES_ENABLED:-false}
      ZOHO_WAREHOUSE_ID: ${ZOHO_WAREHOUSE_ID:-}
      # Production-output gates (non-secret; set in /etc/luma/.env on LXC).
      ZOHO_PRODUCTION_OUTPUT_PERSIST_ENABLED: ${ZOHO_PRODUCTION_OUTPUT_PERSIST_ENABLED:-false}
      ZOHO_PRODUCTION_OUTPUT_PREVIEW_ENABLED: ${ZOHO_PRODUCTION_OUTPUT_PREVIEW_ENABLED:-false}
      ZOHO_PRODUCTION_OUTPUT_COMMIT_ENABLED: ${ZOHO_PRODUCTION_OUTPUT_COMMIT_ENABLED:-false}
      ZOHO_PRODUCTION_OUTPUT_AUTO_QUEUE: ${ZOHO_PRODUCTION_OUTPUT_AUTO_QUEUE:-false}
      ZOHO_ALLOW_SCRIPT_COMMIT_BYPASS: ${ZOHO_ALLOW_SCRIPT_COMMIT_BYPASS:-false}
      ZOHO_BAG_FINISH_RECEIVE_COMMIT_ENABLED: ${ZOHO_BAG_FINISH_RECEIVE_COMMIT_ENABLED:-false}
      # ZOHO-STAGING-BUFFER-v1.1.0 — staging buffer + auto-commit cron.
      # LUMA_CRON_SECRET: bearer token the systemd timer sends to the
      #   POST /api/cron/zoho-auto-commit route. Empty = 503.
      # ZOHO_AUTO_COMMIT_ENABLED: master switch for the cron sweep.
      # ZOHO_AUTO_COMMIT_BUFFER_HOURS: review window before auto-commit
      #   eligibility fires; 0 for immediate (dev/staging tests only).
      LUMA_CRON_SECRET: ${LUMA_CRON_SECRET:-}
      ZOHO_AUTO_COMMIT_ENABLED: ${ZOHO_AUTO_COMMIT_ENABLED:-false}
      ZOHO_AUTO_COMMIT_BUFFER_HOURS: ${ZOHO_AUTO_COMMIT_BUFFER_HOURS:-24}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      # PT-3 PackTrack webhook shared-secret (validated against
      # x-packtrack-secret header in app/api/integrations/packtrack/
      # receipts/route.ts). Empty default = webhook returns 503 until
      # the operator sets it in /opt/luma/.env.
      PACKTRACK_INTEGRATION_SECRET: ${PACKTRACK_INTEGRATION_SECRET:-}
      # Phase C — sales feedback loop secrets.
      # ZOHO_WEBHOOK_SECRET: shared with PackTrack; validates inbound
      #   sales-confirmed webhooks at POST /api/webhooks/zoho-sales.
      # LUMA_PACKTRACK_SECRET: validates PackTrack reads of the BOM API
      #   at GET /api/internal/product-packaging-specs.
      ZOHO_WEBHOOK_SECRET: ${ZOHO_WEBHOOK_SECRET:-}
      LUMA_PACKTRACK_SECRET: ${LUMA_PACKTRACK_SECRET:-}
      STORAGE_ROOT: /data
      NODE_ENV: production
    volumes:
      - ./data:/data
    ports:
      - "${APP_PORT:-3000}:3000"
      - "${OTEL_PROM_HOST_PORT:-9464}:9464"
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 45s
    networks: [internal, egress]

volumes:
  pgdata:

networks:
  internal: { driver: bridge }
  egress: { driver: bridge }
